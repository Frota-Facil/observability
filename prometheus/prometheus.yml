global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: core-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3333
        labels:
          project: sif
          service: core-service
          environment: local

  - job_name: tracking-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3334
        labels:
          project: sif
          service: tracking-service
          environment: local

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3335
        labels:
          project: sif
          service: notification-service
          environment: local

  # Enable when ai-service exposes /metrics.
